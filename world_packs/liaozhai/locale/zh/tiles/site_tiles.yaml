tiles:
  - tile_id: lanruo-temple
    display_name: 兰若寺
    description: 荒废古寺, 殿宇倾颓, 墙外数冢相望。夜间常闻风铃无风自响。
  - tile_id: west-market
    display_name: 市西集
    description: 县城西侧集市, 日有货郎铁匠, 夜归清寂。
  - tile_id: yamen
    display_name: 县衙公堂
    description: 鸣冤鼓、惊堂木、公案文牍齐备。
  - tile_id: yamen-underworld
    display_name: 阴司公堂
    description: 判官持笔, 小鬼列两旁。
  - tile_id: wang-mansion
    display_name: 王家大宅
    description: 三进的青砖庭院, 中堂悬一匾"德泽绵远"。
  - tile_id: sang-residence
    display_name: 桑生书房
    description: 简朴书斋, 夜晚有人灯下读书, 亦有人灯外徘徊。
  - tile_id: zhu-study
    display_name: 朱尔旦书斋
    description: 朱尔旦自换心之后新整饬的书房, 架上多了一尊陆判小像。
  - tile_id: frontier-road
    display_name: 边野古道
    description: 穿州过县的必经之路, 常逢过客。
  - tile_id: shanxi-cave
    display_name: 山西狐洞
    description: 狐族所居, 人不易至。洞内设有仿人间学塾。
