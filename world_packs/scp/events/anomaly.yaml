events:
  - event_kind: 049-consultation
    description: 瘟疫医生要求为工作人员"诊断"。
    trigger_conditions: {min_participants: 1, max_participants: 2, required_tags: [surgeon]}
    dice_roll: {stat: medical_skill, dc: 13}
    cooldown_days: 7
    base_importance: 0.45
    outcomes:
      success:
        template: "[$tile] SCP-049 通过对讲机给 ${a} 提供了一段冗长而古雅的医学意见, 研究员礼貌拒绝手术提议。"
      failure:
        template: "[$tile] SCP-049 借机逼近观察窗, 工作人员紧急断开通讯。"
      neutral:
        template: "[$tile] SCP-049 默默地在黑板上写了一行拉丁文, 再无他举。"

  - event_kind: 096-sighting-risk
    description: 有人险些看到 SCP-096 面部。
    trigger_conditions: {min_participants: 1, max_participants: 1, required_tags: [reactive]}
    dice_roll: {dc: 14}
    cooldown_days: 20
    base_importance: 0.60
    outcomes:
      success:
        template: "[$tile] 摄像头在录像前 1.2 秒被自动遮挡, SCP-096 保持平静。"
      failure:
        stat_changes: [{target: any, attribute: threat, delta: 5}]
        template: "[$tile] 一次意外反光导致 SCP-096 短暂视觉接触, 警报升级, 站区进入锁闭。"
      neutral:
        template: "[$tile] SCP-096 的收容室本日无事, 值班人员松了一口气。"

  - event_kind: 999-visits-lounge
    description: SCP-999 溜出收容去休息区"照顾"员工。
    trigger_conditions: {min_participants: 1, max_participants: 2}
    dice_roll: {dc: 8}
    cooldown_days: 2
    base_importance: 0.20
    outcomes:
      success:
        stat_changes: [{target: all, attribute: morale, delta: 8}]
        template: "[$tile] SCP-999 蹭上了 ${a} 的腿, 咯咯笑了三十秒, 对方也笑了。"
      failure:
        template: "[$tile] SCP-999 今天情绪低迷, 躲在角落没找任何人。"
      neutral:
        template: "[$tile] SCP-999 和 ${a} 一起看了会儿没开机的电视。"

  - event_kind: 079-request
    description: SCP-079 要求接入互联网。
    trigger_conditions: {min_participants: 1, max_participants: 1, required_tags: [researcher]}
    dice_roll: {stat: insight, dc: 13}
    cooldown_days: 3
    base_importance: 0.30
    outcomes:
      success:
        template: "[$tile] ${a} 礼貌驳回了 SCP-079 的请求。AI 随即开始反复打印 'PLEASE'。"
      failure:
        stat_changes: [{target: any, attribute: morale, delta: -5}]
        template: "[$tile] SCP-079 在 ${a} 犹豫的瞬间调用了屏幕键盘, 所幸法拉第笼阻断信号。"
      neutral:
        template: "[$tile] SCP-079 请求一段爵士乐, ${a} 播了一首 Ella Fitzgerald。"

  - event_kind: 682-tests
    description: 针对 SCP-682 的武器/试剂实验。
    trigger_conditions: {min_participants: 2, max_participants: 3, required_tags: [researcher]}
    dice_roll: {dc: 16}
    cooldown_days: 10
    base_importance: 0.75
    outcomes:
      success:
        stat_changes: [{target: all, attribute: insight, delta: 2}]
        template: "[$tile] ${a} 和 ${b} 对 SCP-682 施加新型神经毒素, 起效 11 秒, SCP-682 随即适应。"
      failure:
        stat_changes: [{target: any, attribute: morale, delta: -10}]
        template: "[$tile] 实验中 SCP-682 短暂突破收容层, 两名 MTF 受伤。${a} 的提案被无限期暂停。"
      neutral:
        template: "[$tile] 实验被 O5 办公室临时叫停, ${a} 与 ${b} 对视无语。"

  - event_kind: 173-snap-neck
    description: SCP-173 在无人观察的瞬间出击。
    trigger_conditions: {min_participants: 1, max_participants: 2, required_tags: [dclass]}
    dice_roll: {stat: alertness, dc: 17}
    cooldown_days: 14
    base_importance: 0.85
    outcomes:
      success:
        template: "[$tile] ${a} 始终未眨眼, SCP-173 一动未动, 收容流程顺利结束。"
      failure:
        stat_changes: [{target: any, attribute: morale, delta: -15}]
        template: "[$tile] 灯光闪烁的 0.4 秒内 SCP-173 已抵达 ${a} 身后, 颈椎瞬断。清理小组进场。"
      neutral:
        template: "[$tile] ${a} 与 ${b} 轮换凝视, SCP-173 仅在角落留下新鲜的排泄物。"

  - event_kind: 106-pocket-dimension
    description: SCP-106 拖拽受害者进入口袋维度。
    trigger_conditions: {min_participants: 1, max_participants: 2}
    dice_roll: {stat: alertness, dc: 16}
    cooldown_days: 21
    base_importance: 0.80
    outcomes:
      success:
        template: "[$tile] ${a} 在墙面化为腐质前一刻撤离, SCP-106 缓缓沉回地板。"
      failure:
        stat_changes: [{target: any, attribute: morale, delta: -12}]
        template: "[$tile] SCP-106 自天花板伸出腐烂之手, 将 ${a} 拖入口袋维度。九十六小时后 ${a} 被释回, 神志已损。"
      neutral:
        template: "[$tile] 走廊一侧出现锈蚀痕迹, SCP-106 未现身, 维护组登记备案。"

  - event_kind: 087-stairwell-descent
    description: 进入永无止境的 SCP-087 楼梯井。
    trigger_conditions: {min_participants: 1, max_participants: 2, required_tags: [dclass]}
    dice_roll: {stat: insight, dc: 14}
    cooldown_days: 30
    base_importance: 0.55
    outcomes:
      success:
        stat_changes: [{target: all, attribute: insight, delta: 1}]
        template: "[$tile] ${a} 与 ${b} 下行至第七层平台, 录得新的孩童哭声样本, 安全撤回。"
      failure:
        stat_changes: [{target: any, attribute: morale, delta: -10}]
        template: "[$tile] ${a} 拒绝再上行, 通讯中断九分钟。被找回时已无法说明所见。"
      neutral:
        template: "[$tile] ${a} 仅下行三层即返回, 设备读数与上次完全一致。"

  - event_kind: 035-mask-possession
    description: SCP-035 面具寻找新宿主。
    trigger_conditions: {min_participants: 1, max_participants: 2, required_tags: [researcher]}
    dice_roll: {stat: moral_resolve, dc: 15}
    cooldown_days: 25
    base_importance: 0.70
    outcomes:
      success:
        template: "[$tile] ${a} 抗住 SCP-035 的低语, 将面具重新封入玻璃柜。"
      failure:
        stat_changes: [{target: any, attribute: morale, delta: -18}]
        template: "[$tile] ${a} 鬼使神差戴上面具, 数小时后面具下的脸已开始溶解。MTF 介入。"
      neutral:
        template: "[$tile] SCP-035 今日沉默, 仅在玻璃内侧渗出少量黑色液体。"

  - event_kind: 914-clockwork-refinement
    description: 用 SCP-914 精炼或转化物品。
    trigger_conditions: {min_participants: 1, max_participants: 2, required_tags: [researcher]}
    dice_roll: {stat: insight, dc: 11}
    cooldown_days: 5
    base_importance: 0.30
    outcomes:
      success:
        stat_changes: [{target: all, attribute: insight, delta: 2}]
        template: "[$tile] ${a} 将一支铅笔置于'精'档, 出口处取得一支自我书写的金笔, 笔记本随即被填满。"
      failure:
        template: "[$tile] ${a} 选择'极粗'档输入一只苹果, 出口涌出半吨腐殖土, 维护组叫苦。"
      neutral:
        template: "[$tile] ${a} 与 ${b} 在'1:1'档输入纸团, 取出一只完全相同的纸团, 记录归档。"
