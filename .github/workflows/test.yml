name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-progress runs for the same branch / PR; latest commit wins.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: make check (python + typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install (Python + npm workspaces)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          npm install

      - name: make check
        # Single gate: lint + types + tests + TS build + bundle budget.
        # Exit code is the only signal CI needs — everything AI needs to
        # triage a failure goes via stderr (file:line:kind taxonomy).
        env:
          PYTHONHASHSEED: "0"
        run: make check
